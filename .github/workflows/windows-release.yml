name: Windows release artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version or tag (for example, v0.5.9)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: windows-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-gates:
    name: Verify and bundle Windows release
    runs-on: windows-2025
    timeout-minutes: 120
    env:
      CARGO_TERM_COLOR: always
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      # actions/checkout v7.0.0
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Verify requested release version
        id: release-version
        shell: pwsh
        run: |
          python scripts/test-verify-release-version.py
          python scripts/test-set-release-version.py
          python scripts/test-extract-changelog.py
          $canonical = python scripts/verify-release-version.py "$env:RELEASE_VERSION"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          "version=$canonical" >> $env:GITHUB_OUTPUT

      # actions/setup-node v6.4.0
      - name: Set up Node.js 24.18.0 with lockfile cache
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install pinned npm and Rust MSVC toolchain
        shell: pwsh
        run: |
          npm install --global npm@11.16.0
          rustup set profile minimal
          rustup toolchain install 1.95.0-x86_64-pc-windows-msvc --component rustfmt,clippy --target x86_64-pc-windows-msvc
          rustup default 1.95.0-x86_64-pc-windows-msvc
          ./scripts/check-toolchain.ps1

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: Frontend gates
        shell: pwsh
        run: |
          npm test
          npm run check
          npm run build
          npm audit --audit-level=high

      - name: Fetch and verify immutable native inputs
        shell: pwsh
        run: |
          ./scripts/fetch-native-deps.ps1
          ./scripts/verify-native-deps.ps1

      - name: Rust gates
        shell: pwsh
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
          cargo test --manifest-path src-tauri/Cargo.toml --locked --all-features --target x86_64-pc-windows-msvc
          cargo clippy --manifest-path src-tauri/Cargo.toml --locked --all-features --all-targets --target x86_64-pc-windows-msvc -- -D warnings
          cargo install cargo-audit --version 0.22.2 --locked
          cargo audit --file src-tauri/Cargo.lock

      - name: Secret and whitespace gates
        shell: pwsh
        run: |
          python scripts/test-scan-repository-secrets.py
          python scripts/scan-repository-secrets.py --self-test
          python scripts/scan-repository-secrets.py dist
          git diff --check
          if (git rev-parse --verify HEAD^ 2>$null) { git diff --check HEAD^ HEAD }

      - name: Build MSI, NSIS, and Microsoft Store packages
        shell: pwsh
        run: ./scripts/build-release.ps1

      - name: Reverify native inputs and scan bundle metadata
        shell: pwsh
        run: |
          ./scripts/verify-native-deps.ps1
          python scripts/scan-repository-secrets.py src-tauri/target/release/bundle

      - name: Assert installers and write checksums
        id: artifacts
        shell: pwsh
        run: |
          $msi = @(Get-ChildItem src-tauri/target/release/bundle/msi -Filter *.msi -File -Recurse)
          $nsis = @(Get-ChildItem src-tauri/target/release/bundle/nsis -Filter *.exe -File -Recurse)
          if ($msi.Count -ne 1) { throw "Release gate failed: expected exactly one MSI artifact, found $($msi.Count)." }
          if ($nsis.Count -ne 1) { throw "Release gate failed: expected exactly one NSIS artifact, found $($nsis.Count)." }
          $installers = @($msi) + @($nsis)
          foreach ($file in $installers) {
            if ($file.Length -le 0) { throw "Release gate failed: $($file.Name) is empty." }
          }
          $sumFile = "src-tauri/target/release/bundle/SHA256SUMS"
          $lines = foreach ($file in ($installers | Sort-Object FullName)) {
            $hash = (Get-FileHash -LiteralPath $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $($file.Name)"
          }
          Set-Content -LiteralPath $sumFile -Value $lines -Encoding utf8NoBOM
          Get-Content -LiteralPath $sumFile
          "msi=$($msi[0].FullName)" >> $env:GITHUB_OUTPUT
          "nsis=$($nsis[0].FullName)" >> $env:GITHUB_OUTPUT

      - name: Smoke packaged Windows installers
        shell: pwsh
        run: |
          ./scripts/smoke-packaged-app.ps1 `
            -MsiPath '${{ steps.artifacts.outputs.msi }}' `
            -NsisPath '${{ steps.artifacts.outputs.nsis }}' `
            -SecretScannerPath (Resolve-Path scripts/scan-repository-secrets.py)

      # actions/upload-artifact v7.0.1
      - name: Upload verified Windows installers
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: onyx-windows-${{ steps.release-version.outputs.version }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
          path: |
            src-tauri/target/release/bundle/msi/**/*.msi
            src-tauri/target/release/bundle/nsis/**/*.exe
            src-tauri/target/release/bundle/store/**/*.msix
            src-tauri/target/release/bundle/store/SHA256SUMS
            src-tauri/target/release/bundle/SHA256SUMS

      - name: Extract curated release notes
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: python scripts/extract-changelog.py '${{ steps.release-version.outputs.version }}' --output release-notes.md

      - name: Publish verified GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ github.ref_name }}'
          $msi = @(Get-ChildItem src-tauri/target/release/bundle/msi -Filter *.msi -File -Recurse)
          $nsis = @(Get-ChildItem src-tauri/target/release/bundle/nsis -Filter *.exe -File -Recurse)
          $checksum = Resolve-Path src-tauri/target/release/bundle/SHA256SUMS
          if ($msi.Count -ne 1 -or $nsis.Count -ne 1) {
            throw "Release publication requires exactly one MSI and one NSIS installer."
          }
          if (gh release view $tag --repo $env:GITHUB_REPOSITORY 2>$null) {
            throw "GitHub release '$tag' already exists; refusing to overwrite a public release."
          }

          # Create the release as a draft first so a failed asset upload cannot
          # leave a public/latest release with missing installers.
          gh release create $tag `
            --repo $env:GITHUB_REPOSITORY `
            --verify-tag `
            --draft `
            --title "Onyx $tag" `
            --notes-file release-notes.md
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          try {
            gh release upload $tag `
              --repo $env:GITHUB_REPOSITORY `
              --clobber `
              $msi[0].FullName `
              $nsis[0].FullName `
              $checksum
            if ($LASTEXITCODE -ne 0) { throw "Asset upload failed with exit code $LASTEXITCODE." }

            $assets = gh release view $tag --repo $env:GITHUB_REPOSITORY --json assets --jq '.assets | map(.name) | sort | .[]'
            if ($LASTEXITCODE -ne 0) { throw "Could not verify uploaded release assets." }
            $expected = @($msi[0].Name, $nsis[0].Name, 'SHA256SUMS') | Sort-Object
            $actual = @($assets -split "`n" | Where-Object { $_ })
            if (($actual -join '|') -ne ($expected -join '|')) {
              throw "Release assets incomplete. Expected [$($expected -join ', ')] but found [$($actual -join ', ')]."
            }

            gh release edit $tag `
              --repo $env:GITHUB_REPOSITORY `
              --draft=false `
              --latest
            if ($LASTEXITCODE -ne 0) { throw "Publishing draft release failed with exit code $LASTEXITCODE." }
          }
          catch {
            Write-Host "::error::Release publication failed; deleting incomplete draft release '$tag'."
            gh release delete $tag --repo $env:GITHUB_REPOSITORY --yes --cleanup-tag=false 2>$null | Out-Null
            throw
          }
